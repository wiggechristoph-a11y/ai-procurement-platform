<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureSearch Demo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #1976d2;
            margin-bottom: 40px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            border: 1px solid #e9ecef;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1976d2;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #1565c0;
        }
        
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #545b62;
        }
        
        .status-box {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-box.success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        
        .status-box.warning {
            background: #fff3cd;
            border-color: #ffeaa7;
            color: #856404;
        }
        
        .api-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
        }
        
        .status-dot.connected {
            background: #28a745;
        }
        
        .supplier {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
        }
        
        .supplier-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 8px;
        }
        
        .supplier-location {
            color: #6c757d;
            margin-bottom: 15px;
        }
        
        .supplier-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 15px 0;
            font-size: 14px;
        }
        
        .detail {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        
        .detail-label {
            font-size: 11px;
            color: #6c757d;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-weight: 600;
        }
        
        .analysis {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 3px solid #1976d2;
        }
        
        .hidden {
            display: none;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mb-20 {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin: 10px 0;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 20px;
            }
            
            .supplier-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ProcureSearch</div>
        
        <!-- Login -->
        <div id="login" class="card">
            <h2 class="text-center mb-20">Demo Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="demo@procuresearch.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="demo123">
            </div>
            <button class="btn" onclick="login()">Sign In</button>
            <div class="alert alert-info" style="margin-top: 15px;">
                <strong>Demo accounts:</strong><br>
                demo@procuresearch.com / demo123<br>
                test@test.com / test123
            </div>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="status-box">
                <strong id="userName">Demo User</strong><br>
                <small id="userEmail">demo@procuresearch.com</small>
            </div>
            
            <!-- API Configuration -->
            <div class="card">
                <div class="api-status">
                    <div class="status-dot" id="apiDot"></div>
                    <strong>Claude AI:</strong> <span id="apiStatus">Demo Mode</span>
                </div>
                
                <div id="apiConfig">
                    <div class="form-group">
                        <label>Claude API Key (Optional)</label>
                        <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
                    </div>
                    <button class="btn btn-secondary" onclick="connectAPI()">Connect Real AI</button>
                </div>
                
                <div id="apiConnected" class="hidden">
                    <div class="alert alert-success">✅ Real Claude AI Connected</div>
                    <button class="btn btn-secondary" onclick="disconnectAPI()">Disconnect</button>
                </div>
            </div>
            
            <!-- Search -->
            <div class="card">
                <h3 class="text-center mb-20">Find Suppliers</h3>
                <div class="form-group">
                    <label>What do you need?</label>
                    <textarea id="query" placeholder="Example: 50 office chairs, ergonomic design, modern style, budget €15,000"></textarea>
                </div>
                <div class="form-group">
                    <label>Budget Range</label>
                    <select id="budget">
                        <option value="">Select budget</option>
                        <option value="under_5k">Under €5,000</option>
                        <option value="5k_25k">€5,000 - €25,000</option>
                        <option value="25k_100k">€25,000 - €100,000</option>
                        <option value="over_100k">Over €100,000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Timeline</label>
                    <select id="timeline">
                        <option value="">Select timeline</option>
                        <option value="urgent">Urgent (1 week)</option>
                        <option value="standard">Standard (2-4 weeks)</option>
                        <option value="flexible">Flexible (1+ months)</option>
                    </select>
                </div>
                <button class="btn" onclick="search()" id="searchBtn">🔍 Search with AI</button>
            </div>
            
            <!-- Results -->
            <div id="results" class="hidden">
                <div class="status-box success">
                    ✅ AI Search Complete
                </div>
                <div id="suppliers"></div>
                <div class="card text-center">
                    <button class="btn btn-secondary" onclick="newSearch()">New Search</button>
                    <button class="btn btn-secondary" onclick="logout()" style="margin-top: 10px;">Logout</button>
                </div>
            </div>
        </div>
        
        <!-- Quick Examples -->
        <div id="examples" class="card hidden">
            <h3 class="mb-20">Quick Examples</h3>
            <button class="btn" onclick="loadExample('office')" style="margin-bottom: 10px;">🪑 Office Furniture</button>
            <button class="btn" onclick="loadExample('manufacturing')" style="margin-bottom: 10px;">🏭 Manufacturing</button>
            <button class="btn" onclick="loadExample('it')" style="margin-bottom: 10px;">💻 IT Equipment</button>
            <button class="btn" onclick="loadExample('marketing')" style="margin-bottom: 10px;">📢 Marketing</button>
        </div>
    </div>

    <script>
        let CLAUDE_API_KEY = '';
        let currentUser = null;
        let hasApiKey = false;
        
        const users = {
            'demo@procuresearch.com': {
                name: 'Demo User',
                email: 'demo@procuresearch.com',
                company: 'ProcureSearch',
                password: 'demo123'
            },
            'test@test.com': {
                name: 'Test User', 
                email: 'test@test.com',
                company: 'Test Company',
                password: 'test123'
            }
        };

        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const user = users[email.toLowerCase()];
            if (!user || user.password !== password) {
                alert('Invalid login credentials');
                return;
            }
            
            currentUser = user;
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('examples').classList.remove('hidden');
            
            updateAPIStatus();
            console.log('✅ Logged in as:', user.name);
        }

        function connectAPI() {
            const key = document.getElementById('apiKey').value.trim();
            
            if (!key) {
                alert('Please enter your Claude API key');
                return;
            }
            
            if (!key.startsWith('sk-ant-api03-')) {
                alert('Invalid API key format');
                return;
            }
            
            CLAUDE_API_KEY = key;
            hasApiKey = true;
            updateAPIStatus();
            
            alert('✅ Claude AI connected successfully!');
            console.log('✅ API connected');
        }

        function disconnectAPI() {
            CLAUDE_API_KEY = '';
            hasApiKey = false;
            document.getElementById('apiKey').value = '';
            updateAPIStatus();
            
            alert('⚠️ Disconnected from Claude AI');
            console.log('⚠️ API disconnected');
        }

        function updateAPIStatus() {
            const dot = document.getElementById('apiDot');
            const status = document.getElementById('apiStatus');
            const config = document.getElementById('apiConfig');
            const connected = document.getElementById('apiConnected');
            
            if (hasApiKey) {
                dot.classList.add('connected');
                status.textContent = 'Real AI Mode';
                config.classList.add('hidden');
                connected.classList.remove('hidden');
            } else {
                dot.classList.remove('connected');
                status.textContent = 'Demo Mode';
                config.classList.remove('hidden');
                connected.classList.add('hidden');
            }
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const budget = document.getElementById('budget').value;
            const timeline = document.getElementById('timeline').value;
            
            if (!query || !budget || !timeline) {
                alert('Please fill in all fields');
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '🔍 Searching...';
            
            console.log('🔍 Starting search...');
            let suppliers = [];
            
            if (hasApiKey && CLAUDE_API_KEY) {
                try {
                    console.log('🤖 Using real Claude API...');
                    suppliers = await callClaudeAPI(query, budget, timeline);
                    console.log('✅ Claude API successful!');
                } catch (error) {
                    console.log('❌ Claude API failed:', error.message);
                    suppliers = generateDemoSuppliers(budget);
                    showAlert('⚠️ API failed, showing demo results: ' + error.message, 'warning');
                }
            } else {
                console.log('🎭 Using demo mode');
                suppliers = generateDemoSuppliers(budget);
            }
            
            setTimeout(() => {
                displayResults(suppliers);
                btn.disabled = false;
                btn.textContent = '🔍 Search with AI';
                
                if (hasApiKey && CLAUDE_API_KEY) {
                    showAlert('✅ Real Claude AI search completed!', 'success');
                } else {
                    showAlert('Demo search completed', 'info');
                }
            }, 2000);
        }

        async function callClaudeAPI(query, budget, timeline) {
            const prompt = `Find 3 European suppliers for this requirement:

NEED: ${query}
BUDGET: ${budget}
TIMELINE: ${timeline}
COMPANY: ${currentUser.company}

Return JSON with suppliers array:
{
  "suppliers": [
    {
      "name": "Company Name GmbH",
      "location": "City, Country", 
      "pricing": "€X,XXX - €Y,YYY",
      "delivery": "X weeks",
      "contact": "sales@company.com",
      "analysis": "Why this supplier fits"
    }
  ]
}

Focus on real European companies.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': CLAUDE_API_KEY,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 2000,
                    messages: [{ role: 'user', content: prompt }]
                })
            });

            if (!response.ok) {
                if (response.status === 401) throw new Error('Invalid API key');
                if (response.status === 429) throw new Error('Rate limit exceeded');
                throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            const content = data.content[0].text;

            const jsonMatch = content.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                const parsed = JSON.parse(jsonMatch[0]);
                if (parsed.suppliers && parsed.suppliers.length > 0) {
                    return parsed.suppliers;
                }
            }

            throw new Error('No suppliers found');
        }

        function generateDemoSuppliers(budget) {
            return [
                {
                    name: "EuroSupply Solutions GmbH",
                    location: "Hamburg, Germany",
                    pricing: estimatePrice(budget),
                    delivery: "2-3 weeks",
                    contact: "sales@eurosupply.de",
                    analysis: "Leading German supplier with excellent quality standards and reliable delivery times."
                },
                {
                    name: "Netherlands Trade Partners",
                    location: "Amsterdam, Netherlands", 
                    pricing: estimatePrice(budget, 0.9),
                    delivery: "1-2 weeks",
                    contact: "info@ntpartners.nl",
                    analysis: "Fast delivery specialist with competitive pricing and strong customer service."
                },
                {
                    name: "Alpine Business Solutions",
                    location: "Vienna, Austria",
                    pricing: estimatePrice(budget, 1.1),
                    delivery: "3-4 weeks", 
                    contact: "sales@alpine-solutions.at",
                    analysis: "Premium quality supplier with comprehensive support and extended warranty options."
                }
            ];
        }

        function estimatePrice(budget, multiplier = 1) {
            const ranges = {
                'under_5k': [2000, 4500],
                '5k_25k': [5000, 22000], 
                '25k_100k': [25000, 95000],
                'over_100k': [100000, 250000]
            };
            
            const range = ranges[budget] || [10000, 30000];
            const price = Math.round((range[0] + Math.random() * (range[1] - range[0])) * multiplier);
            return `€${price.toLocaleString()}`;
        }

        function displayResults(suppliers) {
            const container = document.getElementById('suppliers');
            const mode = hasApiKey && CLAUDE_API_KEY ? 'REAL AI' : 'DEMO';
            
            container.innerHTML = suppliers.map(supplier => `
                <div class="supplier">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div class="supplier-name">${supplier.name}</div>
                        <span style="background: ${hasApiKey ? '#28a745' : '#ffc107'}; color: ${hasApiKey ? 'white' : '#212529'}; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;">
                            ${mode}
                        </span>
                    </div>
                    <div class="supplier-location">${supplier.location}</div>
                    
                    <div class="supplier-details">
                        <div class="detail">
                            <div class="detail-label">Pricing</div>
                            <div class="detail-value">${supplier.pricing}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Delivery</div>
                            <div class="detail-value">${supplier.delivery}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Contact</div>
                            <div class="detail-value" style="font-size: 12px;">${supplier.contact}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Status</div>
                            <div class="detail-value">✅ Available</div>
                        </div>
                    </div>
                    
                    <div class="analysis">
                        <strong>🤖 AI Analysis:</strong> ${supplier.analysis}
                    </div>
                    
                    <button class="btn btn-secondary" onclick="contact('${supplier.name}', '${supplier.contact}')">
                        📞 Contact ${supplier.name}
                    </button>
                </div>
            `).join('');
            
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function loadExample(type) {
            const examples = {
                office: {
                    query: "50 ergonomic office chairs for growing team. Need adjustable height, lumbar support, modern design in grey or black. Must be comfortable for 8+ hours daily use.",
                    budget: "5k_25k", 
                    timeline: "standard"
                },
                manufacturing: {
                    query: "CNC machining services for precision aluminum parts. Need ISO 9001 certified supplier for automotive components. Quantities 500-2000 pieces per month.",
                    budget: "25k_100k",
                    timeline: "flexible"
                },
                it: {
                    query: "Business laptops - 25 units. Need Intel i7, 16GB RAM, 512GB SSD, Windows 11 Pro. Prefer ThinkPad or similar business grade.",
                    budget: "25k_100k",
                    timeline: "urgent"
                },
                marketing: {
                    query: "Trade show materials: 1000 branded tote bags, 2000 pens, 500 USB drives, pop-up banners. High quality printing, eco-friendly materials preferred.",
                    budget: "under_5k",
                    timeline: "flexible"
                }
            };
            
            const example = examples[type];
            if (example) {
                document.getElementById('query').value = example.query;
                document.getElementById('budget').value = example.budget;
                document.getElementById('timeline').value = example.timeline;
                
                // Scroll to search form
                document.getElementById('query').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function contact(name, email) {
            alert(`📞 Contact Information:\n\nCompany: ${name}\nEmail: ${email}\n\nIn the full platform, we would automatically send your RFQ and track responses!`);
        }

        function newSearch() {
            document.getElementById('query').value = '';
            document.getElementById('budget').value = '';
            document.getElementById('timeline').value = '';
            document.getElementById('results').classList.add('hidden');
        }

        function logout() {
            currentUser = null;
            hasApiKey = false;
            CLAUDE_API_KEY = '';
            
            document.getElementById('login').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('examples').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            
            document.getElementById('email').value = 'demo@procuresearch.com';
            document.getElementById('password').value = 'demo123';
            document.getElementById('apiKey').value = '';
            
            console.log('🚪 Logged out');
        }

        function showAlert(message, type) {
            // Simple alert for now - could enhance with toast notifications
            if (type === 'success') {
                console.log('✅', message);
            } else if (type === 'warning') {
                console.log('⚠️', message);
            } else {
                console.log('ℹ️', message);
            }
        }

        // Initialize
        window.addEventListener('load', function() {
            console.log('🚀 Simple ProcureSearch Demo Ready');
            updateAPIStatus();
        });
    </script>
</body>
</html>
